_format_version: '3.0'
_transform: true

# -----------------------------------------------------------------------------
# SERVICES
# -----------------------------------------------------------------------------
services:
  # --- Ingestion Service (Tracker API) ---
  - name: ingestion-service
    url: http://ingestion:3001 # docker-compose service name
    routes:
      - name: track-route
        paths:
          - /v1/track
        strip_path: false
        protocols:
          - http
          - https
    plugins:
      # API key authentication
      - name: key-auth
        config:
          key_names:
            - X-API-Key
          hide_credentials: false
      # Rate limiting per API key
      - name: rate-limiting
        config:
          minute: 1000
          hour: 10000
          policy: redis
          redis_host: redis
          redis_port: 6379
          limit_by: credential # per API key (consumer)

  # --- Ingestion Readiness Probe (no auth) ---
  - name: ingestion-readiness
    url: http://ingestion:3001
    routes:
      - name: readiness-route
        paths:
          - /v1/ready
        strip_path: false
        protocols:
          - http
          - https

  # --- Admin API (JWT protected) ---
  - name: admin-api
    url: http://admin-api:3008
    routes:
      - name: admin-route
        paths:
          - /v1/admin
        strip_path: false
        protocols:
          - http
          - https
    plugins:
      # JWT authentication (built‑in, no license needed)
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify:
            - exp
          # Optional: forward claims as headers
          header_names:
            - X-User-ID
            - X-User-Roles
      # Rate limiting per JWT consumer (optional)
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
          limit_by: consumer

  # --- Intervention Gateway (WebSocket + REST poll for tracker.js) ---
  # Internal POST /v1/push is NOT routed through Kong — Decision Engine calls
  # http://intervention-gateway:3005 directly via Docker network.
  - name: intervention-gateway
    url: http://intervention-gateway:3005
    routes:
      # WebSocket upgrade — tracker.js primary delivery channel
      - name: ws-route
        paths:
          - /ws
        strip_path: false
        protocols:
          - http
          - https
        plugins:
          - name: key-auth
            config:
              key_names:
                - api_key
              key_in_query: true
              key_in_header: false
              hide_credentials: true
          - name: rate-limiting
            config:
              minute: 60
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: credential

      # REST poll fallback — tracker.js polls when WebSocket disconnected
      - name: intervention-poll-route
        paths:
          - /v1/interventions/pending
        methods:
          - GET
        strip_path: false
        protocols:
          - http
          - https
        plugins:
          - name: key-auth
            config:
              key_names:
                - api_key
              key_in_query: true
              key_in_header: false
              hide_credentials: true
          - name: cors
            config:
              origins:
                - "*"   # restrict to storefront domains in production
              methods:
                - GET
                - OPTIONS
              headers:
                - Content-Type
              max_age: 3600
          - name: rate-limiting
            config:
              minute: 120   # tracker.js polls every 30s; 120/min allows burst
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: credential

# -----------------------------------------------------------------------------
# CONSUMERS & CREDENTIALS
# -----------------------------------------------------------------------------
consumers:
  # Consumer for tracker API key
  - username: tracker-store-1
    custom_id: store-1
    keyauth_credentials:
      - key: 'test-api-key-123'

  # Consumer for admin JWT
  - username: admin-api
    custom_id: admin-1
    jwt_secrets:
      - secret: 'your-256-bit-secret-change-me'
        algorithm: HS256
        key: 'admin-key'
