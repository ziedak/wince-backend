name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: oven-sh/setup-bun@v2
        
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - run: npx nx run-many -t lint test build typecheck e2e-ci

