services:
  # --- KONG API GATEWAY (DB-less mode) ---
  kong:
    image: kong:3.6
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/zied/Workspace/wince_backend/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - "8000:8000" # Public proxy
      - "8001:8001" # Admin API (optional, for debugging)
    volumes:
      - ./kong.yml:/home/zied/Workspace/wince_backend/kong.yml:ro
    depends_on:
      - redis
    restart: unless-stopped

  # --- KAFKA & ZOOKEEPER ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 2181" ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # One-shot bootstrap job that creates Kafka topics after the broker is ready.
  # It is expected to exit successfully once the topics exist.
  init-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: init-kafka
    depends_on:
      kafka:
        condition: service_started
    restart: "no"
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready 1 40 -b kafka:29092
      echo 'Creating 64-partition topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.events --partitions 64 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic enriched.events --partitions 64 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic intervention.log --partitions 16 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.log --partitions 16 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead.letters --partitions 8 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit.log --partitions 8 --replication-factor 1
      echo 'Topics created successfully!'

  # --- POSTGRESQL & PGBOUNCER ---
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    depends_on:
      - postgres
    ports:
      - "6432:6432"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: password
      DB_NAME: app_db
      LISTEN_PORT: 6432
      AUTH_TYPE: any
    restart: unless-stopped

  # --- REDIS + REDISBLOOM ---
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # --- CLICKHOUSE ---
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  # --- MINIO (S3 mock for models, DLQ) ---
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # --- PLACEHOLDER SERVICES (to be implemented) ---
  ingestion:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    container_name: ingestion
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      KAFKA_HOSTS: kafka:29092
      KAFKA_TOPIC_RAW: raw.events
      REDIS_URL: redis://redis:6379
      REDIS_BLOOM_KEY: idem:bloom
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    restart: unless-stopped
  # admin-api:
  #   image: alpine:3.18
  #   container_name: admin-api
  #   command: [ "sleep", "infinity" ]
  #   restart: unless-stopped

  # intervention-gateway:
  #   image: alpine:3.18
  #   container_name: intervention-gateway
  #   command: [ "sleep", "infinity" ]
  #   restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  chdata:
  miniodata:
