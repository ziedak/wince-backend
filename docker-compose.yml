services:
  # ---------------------------------------------------------------------------
  # KONG API GATEWAY (DB mode — Postgres backend, config managed via deck sync)
  # Architecture decision: DB mode chosen over DB-less so new store API keys
  # can be provisioned dynamically via Admin API without a kong.yml reload.
  # kong-deck applies kong.yml on startup; re-run `docker compose restart
  # kong-deck` after any kong.yml change to sync.
  # ---------------------------------------------------------------------------

  # Dedicated Postgres for Kong (isolated from application DB)
  kong-db:
    image: postgres:14-alpine
    container_name: kong-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Bootstrap DB schema on first run; idempotent on subsequent runs
  kong-migrations:
    image: kong:3.6
    container_name: kong-migrations
    entrypoint: ["sh", "-c", "kong migrations bootstrap 2>/dev/null || true; kong migrations up"]
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
    restart: "no"

  kong:
    image: kong:3.6
    container_name: kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - "8000:8000" # Public proxy
      - "8001:8001" # Admin API
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # Applies kong.yml declarative config to Kong via Admin API on startup.
  # Re-run `docker compose restart kong-deck` to re-sync after kong.yml changes.
  kong-deck:
    image: kong/deck:v1.38.1
    container_name: kong-deck
    command: ["sync", "--kong-addr", "http://kong:8001", "--state", "/deck/kong.yml"]
    volumes:
      - ./kong.yml:/deck/kong.yml:ro
    depends_on:
      kong:
        condition: service_healthy
    restart: "no"

  # --- KAFKA & ZOOKEEPER ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 2181" ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # One-shot bootstrap job that creates Kafka topics after the broker is ready.
  # It is expected to exit successfully once the topics exist.
  init-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: init-kafka
    depends_on:
      kafka:
        condition: service_started
    restart: "no"
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready 1 40 -b kafka:29092
      echo 'Creating 64-partition topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.events --partitions 64 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic enriched.events --partitions 64 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic intervention.log --partitions 16 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.log --partitions 16 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead.letters --partitions 8 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit.log --partitions 8 --replication-factor 1
      echo 'Topics created successfully!'

  # --- POSTGRESQL & PGBOUNCER ---
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    depends_on:
      - postgres
    ports:
      - "6432:6432"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: password
      DB_NAME: app_db
      LISTEN_PORT: 6432
      AUTH_TYPE: any
    restart: unless-stopped

  # --- REDIS + REDISBLOOM ---
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # --- CLICKHOUSE ---
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  # --- MINIO (S3 mock for models, DLQ) ---
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # --- PLACEHOLDER SERVICES (to be implemented) ---
  ingestion:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    container_name: ingestion
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      KAFKA_HOSTS: kafka:29092
      KAFKA_TOPIC_RAW: raw.events
      REDIS_URL: redis://redis:6379
      REDIS_BLOOM_KEY: idem:bloom
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    restart: unless-stopped
  # admin-api:
  #   image: alpine:3.18
  #   container_name: admin-api
  #   command: [ "sleep", "infinity" ]
  #   restart: unless-stopped

  decision-engine:
    build:
      context: .
      dockerfile: apps/decision-engine/Dockerfile
    container_name: decision-engine
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
    environment:
      PORT: 3007
      KAFKA_HOSTS: kafka:29092
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://admin:password@pgbouncer:6432/app_db
      CLICKHOUSE_URL: http://clickhouse:8123
      INTERNAL_SECRET: dev-internal-secret
      GATEWAY_URL: http://intervention-gateway:3005
      NOTIFICATION_URL: http://notification-service:3006
      LOG_LEVEL: info
      # MODEL_PATH: /app/models/dummy.onnx  # uncomment after running generate-dummy-onnx.py
    ports:
      - "3007:3007"
    restart: unless-stopped

  intervention-gateway:
    build:
      context: .
      dockerfile: apps/intervention-gateway/Dockerfile
    container_name: intervention-gateway
    depends_on:
      redis:
        condition: service_started
    environment:
      PORT: 3005
      REDIS_URL: redis://redis:6379
      INTERNAL_SECRET: dev-internal-secret
      POD_IP: intervention-gateway  # Docker hostname acts as pod IP in single-node dev
      WS_TTL_SECONDS: 60
      PENDING_TTL_SECONDS: 1800
      LOG_LEVEL: info
    ports:
      - "3005:3005"
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
    environment:
      PORT: 3006
      KAFKA_HOSTS: kafka:29092
      INTERNAL_SECRET: dev-internal-secret
      LOG_LEVEL: info
      # SENDGRID_API_KEY: your-key
      # TWILIO_ACCOUNT_SID: your-sid
      # TWILIO_AUTH_TOKEN: your-token
      # TWILIO_FROM_NUMBER: +1xxxxxxxxxx
    ports:
      - "3006:3006"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  chdata:
  miniodata:
  kong-db-data:
