[package]
name = "rust-postgre_client"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core database layer - compile-time checked queries (postgres only)
sqlx = { version = "0.7", default-features = false, features = ["runtime-tokio-rustls", "postgres", "macros", "chrono"] }

# Retry logic with exponential backoff
backoff = { version = "0.4", features = ["tokio"] }

# URL parsing
url = "2"

# Observability
tracing = "0.1"

# Error handling
thiserror = "1"
anyhow = "1"

# Async runtime
tokio = { version = "1", features = ["sync"] }
