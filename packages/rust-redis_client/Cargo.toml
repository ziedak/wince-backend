[package]
name = "rust-redis_client"
version = "0.1.0"
edition = "2021"

[dependencies]
futures-util = "0.3"
redis = { version = "0.25", features = ["tokio-comp", "connection-manager"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tracing = "0.1"
tokio = { version = "1", features = ["rt-multi-thread"] }